<!DOCTYPE html>
<html>
<head>
  <title>My First Project</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    p {
      color: #666;
      font-size: 18px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Hello, I started.</h1>

  <p id="message">
    This is Day 4 of my consistency streak.
  </p>

  <button onclick="changeText()">
    Click Me
  </button>

  <script>
    function changeText() {
      var message = document.getElementById("message");
      switch(message.innerText){
        case "This is Day 4 of my consistency streak.":
          message.innerText = "Button clicked. I'm still showing up.";
          break;
        default:
          message.innerText = "Button clicked. I'm still showing up.";
      }
      message.style.color = "#" + Math.floor(Math.random()*16777215).toString(16);
    }
  </script>

</body>
</html>
