<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button style="margin-top: 18px;" onclick="location.href='index.html'">
    Home
  </button>

  <div style="margin-top: 30px;">
    <input class = "add-task" style = "background-color: white; color: black;" type="text" id="taskInput" placeholder="Enter a task" />
    <button class = "add-task" onclick="addTask()">+</button>
  </div>
  <div style="margin-top:20px;">
    <button id="allFilter" class = "main-filter-button" onclick="setFilter('allFilter')">All</button>
    <button id="completedFilter" class = "main-filter-button" onclick="setFilter('completedFilter')">Completed</button>
    <button id="pendingFilter" class = "main-filter-button" onclick="setFilter('pendingFilter')">Pending</button>
  </div>

  <div class="filter-container">
    <select class="dropdown-box" id="sortSelect" onchange="updateSort()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
    <input type="text" id="searchInput" style = "padding:10px;background: rgba(255, 255, 255, 0.8);" placeholder="Search tasks..." oninput="updateSearch()" />
  </div>
  <div class="content-container">
    <div class="task-header">
      <span>Task</span>
      <span>Status</span>
      <span>Actions</span>
    </div>
    <div id="taskList"></div>
    <div id="statsContainer" class="stats-container">
      <span class="stat" id="totalTasks"></span>
      <span class="stat" id="completedTasks"></span>
      <span class="stat" id="pendingTasks"></span>
      <span class="stat" id="completionRate"></span>
    </div>
  </div>
  <script src="todoScript.js"></script>

</body>

</html>
